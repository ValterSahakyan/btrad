<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- Left candlestick (bullish green) -->
  <!-- wick top -->
  <line x1="8" y1="6" x2="8" y2="9" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- body -->
  <rect x="5.5" y="9" width="5" height="10" rx="1" fill="#22c55e"/>
  <!-- wick bottom -->
  <line x1="8" y1="19" x2="8" y2="22" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right candlestick (bearish white/muted) -->
  <!-- wick top -->
  <line x1="24" y1="8" x2="24" y2="12" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- body -->
  <rect x="21.5" y="12" width="5" height="8" rx="1" fill="rgba(255,255,255,0.55)"/>
  <!-- wick bottom -->
  <line x1="24" y1="20" x2="24" y2="25" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Centre bar (accent / signal line) -->
  <rect x="14.5" y="14" width="3" height="12" rx="1" fill="#22c55e" opacity="0.85"/>
  <line x1="16" y1="10" x2="16" y2="14" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
</svg>
