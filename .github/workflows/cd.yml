name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deployment runs at a time — never overlap
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ── 1. Run full CI first — never deploy broken code to a live trading bot ──
  ci:
    uses: ./.github/workflows/ci.yml

  # ── 2. Deploy to production VPS ───────────────────────────────────────────
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /var/www/btrad

            # Pull latest code
            git pull origin main

            # Install dependencies (all workspaces)
            npm ci

            # Build backend
            npm --workspace backend run prisma:generate
            npm --workspace backend run build

            # Build frontend
            NEXT_PUBLIC_API_BASE_URL=https://api.yogurtsoftware.info/api \
              npm --workspace frontend run build

            # Build Docker images from the freshly built source
            docker compose build backend frontend

            # Restart backend first (runs DB migrations on startup), then frontend
            # postgres and redis are untouched — no DB downtime
            docker compose up -d --no-deps backend
            sleep 15
            docker compose up -d --no-deps frontend

            # Remove dangling images to free disk space
            docker image prune -f

            echo "✅ Deployed $(git rev-parse --short HEAD) to production"
