name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deployment runs at a time; never overlap.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # 1. Run full CI first; never deploy broken code to a live trading bot.
  ci:
    uses: ./.github/workflows/ci.yml

  # 2. Deploy to production VPS.
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 45m
          envs: GITHUB_SHA,GITHUB_REF_NAME
          script: |
            set -e
            cd /var/www/btrad

            echo "Deploying ref=$GITHUB_REF_NAME sha=$GITHUB_SHA"

            # Deploy the exact commit that triggered this workflow, not just
            # whichever commit happens to be at the branch tip on the server.
            git fetch --prune origin
            git checkout "$GITHUB_REF_NAME"
            git reset --hard "$GITHUB_SHA"

            CURRENT_SHA=$(git rev-parse HEAD)
            if [ "$CURRENT_SHA" != "$GITHUB_SHA" ]; then
              echo "Ref checkout mismatch: expected $GITHUB_SHA got $CURRENT_SHA"
              exit 1
            fi

            # This workflow builds from source on the server. Ignore any
            # preconfigured GHCR image names in the server environment, since
            # invalid mixed-case tags there can break docker compose parsing.
            export BACKEND_IMAGE=perpscout-backend-local
            export FRONTEND_IMAGE=perpscout-frontend-local

            # Rebuild application images on the server. Because the checkout is
            # already pinned to the exact workflow SHA above, we do not need to
            # throw away Docker layer cache on every deploy. Keeping cache makes
            # repeated deploys much faster, especially when package manifests
            # have not changed.
            docker compose build backend frontend

            # Ensure postgres and redis are running. --no-deps skips depends_on
            # health checks, so we must guarantee postgres is healthy ourselves.
            docker compose up -d postgres redis
            for i in $(seq 1 30); do
              PG=$(docker inspect --format='{{.State.Health.Status}}' btrad-postgres-1 2>/dev/null || echo "unknown")
              echo "Postgres health ($i/30): $PG"
              [ "$PG" = "healthy" ] && break
              if [ "$i" -eq 30 ]; then
                echo "Postgres did not become healthy in 60s"
                docker compose ps
                exit 1
              fi
              sleep 2
            done

            # Clear any migration entries stuck in a failed/incomplete state
            # from a previous aborted deployment. All migration SQL uses
            # IF NOT EXISTS so re-running after a reset is always safe.
            docker compose exec -T postgres \
              psql -U "${POSTGRES_USER:-postgres}" perpscout \
              -c "DELETE FROM _prisma_migrations WHERE finished_at IS NULL AND rolled_back_at IS NULL;" \
              2>/dev/null || true

            # Restart backend first (runs DB migrations on startup), then frontend.
            # --force-recreate ensures the new image is always used even if the
            # image tag/name is unchanged. Postgres and Redis are untouched.
            docker compose up -d --no-deps --force-recreate backend
            docker compose up -d --no-deps --force-recreate frontend

            # Wait up to 3 minutes for both containers to become healthy.
            for i in $(seq 1 36); do
              BACKEND_STATE=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' btrad-backend-1 2>/dev/null || true)
              FRONTEND_STATE=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' btrad-frontend-1 2>/dev/null || true)
              echo "Health check attempt $i: backend=$BACKEND_STATE frontend=$FRONTEND_STATE"

              if [ "$BACKEND_STATE" = "healthy" ] && [ "$FRONTEND_STATE" = "healthy" ]; then
                break
              fi

              if [ "$i" -eq 36 ]; then
                echo "Deployment failed health checks"
                docker compose ps
                docker compose logs --tail=200 backend frontend
                exit 1
              fi

              sleep 5
            done

            docker compose ps

            # Remove dangling images to free disk space.
            docker image prune -f

            echo "Deployed $(git rev-parse --short HEAD) to production"
