name: CI

on:
  workflow_call:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: perpscout
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d perpscout"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/perpscout
      REDIS_URL: redis://localhost:6379
      APP_PORT: "3000"
      BINANCE_API_KEY: ""
      BINANCE_API_SECRET: ""
      DASHBOARD_AUTH_ENABLED: "false"
      DASHBOARD_ALLOWED_WALLET: "0x0000000000000000000000000000000000000000"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000/api"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm --workspace backend run prisma:generate

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=backend/prisma/schema.prisma

      - name: TypeScript check — backend
        run: npx tsc --noEmit --project backend/tsconfig.json

      - name: TypeScript check — frontend
        run: npx tsc --noEmit --project frontend/tsconfig.json

      - name: Build backend
        run: npm --workspace backend run build

      - name: Run backend tests
        run: npm --workspace backend run test

      - name: Build frontend
        run: npm --workspace frontend run build
        env:
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:3000/api"
